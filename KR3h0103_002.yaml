body:
  text: 籟紀天籟卷之上條風一曰炎風起自變天方土之蒼門從東北來陳子聞而賦之曰噫條風之沕穆兮出萬物而條治釋寒冰而方堅兮吁陳荄於既死睹澌流之汛汛兮羡方舟之南逝感群類之有復兮哀吾生之終否明庶風一曰谷風起自界天開明之門從東方來陳子聞而賦之曰噫谷風之習習兮明衆物而殫出粲芳春之韶豔兮疇蔪蔪其秀麥審雨露之有期兮懼芬華之頓息時冉冉其告嘗兮痛皇考之不食清明風起自陽天波毋之門從東南來陳子聞而賦之曰噫清明之振振兮吹萬物而西適覽動植之向榮兮念豫降於五日緊始而邦之蔡兮壯齊戶而帝陟曰豫受命于天兮豈公子之我失景風一曰凱風又曰薰風亦曰巨風起自赤天之暑門從南方來陳子聞而賦之曰噫飄颻之景風兮鼓極陽而斯竟推物奮之將零兮知先業之不競何虞舜之垂裳兮歌南薰而解乎民慍彼商均之不肖兮歸四海于文命涼風起自朱天編駒之白門從西南來陳子聞而賦之曰噫涼風之率至兮氣沈奪而趨悴景瑟瑟其悉豫兮溥白露于唐砌憶樂遊之嘉會兮極南州之鴻士惜異物之奄迫兮漸一身以媚世閶闔風一曰盲風又曰飂風亦曰泰風起自成天之閶闔門從西方來陳子聞而賦之曰噫盲風之𩗱𩙖兮闔萬品于黃泉悲草木之蘦落兮感生事之暮年將憑衰而遄隕兮見神靈之無顏聊仙桂以自佩兮掇芳菊以為飱不周風一曰麗風起自幽天幽都之門從西北來陳子聞而賦之曰噫肅肅之不周兮哀有生之盡劉氣感發而襲豫室兮塗版屋以綢繆追孩提之官處兮隱雙闕之廣修去傳舍之無幾兮恣麋鹿之所遊廣莫風一曰寒風又曰涼風起自玄天之寒門從北方來陳子聞而賦之曰噫廣莫之蓬蓬兮負一陽而上舒則先王之閉關兮衷紛濁其焉驅厲晏歲之冰雪兮攬無溫之故襦閲慈母之手澤兮痛罔極以躊蹰雷陰陽相薄而為雷天地之鼓也陳子聞而賦之曰來殷殷以疾舉兮撼坤維而崩蕩鼓含生以長遂兮慨必壯之永降彼君子之修省兮奉天威以寅亮唯狡童之不戒兮乃終喪乎七鬯雨陰陽相蒸為雨陳子聞而賦之曰惟太陰之次畢兮乘玄雲之祁祁衡君德之狂肅兮乃或恆而或時滅燭龍之偉耀兮動子桑之歔欷驚南冠之長往兮為土偶之所嗤霰一曰霄雪水雪雜下也雪自上下為溫氣所摶故曰陽之專氣為霰陳子聞而賦之曰瀌回霰之雜遝兮遡流風而逸起詠雨雪之遺旨兮年既邁乎三紀慚不惑之豫遠兮毛班班而齲齒聊飲酒以胥會兮悼親戚之無幾雹霰之流也陰氣暴上雨則凝結成雹故曰陰之專氣為雹陳子聞而賦之曰驅驚頽以下降兮躍冰丸以破屋摧牟麥之方振兮殺既拆之荏菽縣枵腹以待哺兮畯夫告言以有蹙豈天誤豫之負名兮戒豫食夫周粟雪水下遇寒而凝因風相襲而成雪也陳子聞而賦之曰紛玄液之上凝兮色杲杲而返母似飛鹺之高撒兮扣霏屑於蓬牗豈焦舌之莫辨兮實病聰之所咎弛昔余之桑土兮瞻玉樹而長詬餘溜雨後簷溝餘瀝也陳子聞而賦之曰瞻霂霡之霏微兮染陶瓦以驟濕瀝洪滋於方至兮繼餘潤而晚及挾鳴漏以霄下兮和孤婺之夜泣擊愁心之欲碎兮弄甘焦以點滴
