body:
  text: 籟紀敘夫一元上始無聲臭也二氣方析斯喘動哉是以乾坤畫而風雷至往復定而律呂存人肖玄樞耳為感際故聆虛器則潮震語空山則谷應蓋有形斯氣有氣斯響靡往弗充接之在有也予遭變故以來骨肉奄已漂淪氣焰頓乎消歇裸將京邑夢寐丘陵既慚瓜美青門秪哭黍離白下故雖強對妻孥都非舊態行坐臥起觸耳成悲古人云樂一也喜者聽之喜悲者聽之悲豈靈造之變更亦人心之遷適也爰取莊子三籟之義嗣采史傳八風之言附諸有聲彙為一筴將以上胤麥秀之音下攄離騷之感冀同遇者之覽觀非敢語于中和之君子矣
