body:
  text: 籟紀天籟卷之下灘聲陳子聞而賦之曰怒廻岸以若抗兮扼飛源於上游迸哀瀧而奔瀉兮逝滔滔其莫休聲潺湲以擊予枕兮魂氾淚而欲流謂靈均之彷彿兮寤須臾之足羞谷聲谷聲者虛谷接物之聲也陳子聞而賦之曰抱紆岡以貯響兮副有聲而和旃鳥嚶嚶其效苦兮風凄凄而愈嚴輔孤臣以太息兮偕怨女而告天酬虛空之謦欬兮慰山鬼之笑言林聲林聲者林木和風之聲也陳子聞而賦之曰森高林以藐邃兮感吹萬而怒號震晴空之雷雨兮磕陸野之洶濤雖美惡之同風兮諒貞糜之異操憂樗櫟之偕朽兮羨松柏之後凋落葉聲落葉聲者木葉脫落聲也陳子聞而賦之曰既霜露以申戒兮復寒風以見摧寔衰運之伊遘兮匪故條之忍辭約閨容以並落兮引鄉心而共飛翻芳華於回首兮嘆飄泊其焉依雞聲雞聲者陽將升雞感之而為聲也陳子聞而賦之曰知曜靈之將曙兮度芳聲於夜塒動征車於前路兮送孤舟於天涯衣顛倒以振予袖兮愴河山之已非念牝晨之凶索兮又焉思乎后妃蛙聲蛙聲者沮澤之鳴蛙也陳子聞而賦之曰鬱葭菼以被野兮欲颺灰其無從都沮洳以為勝兮擅長鳴以稱雄嗟子陽之尊大兮感華林之太惷予微茲之故兮胡為乎泥中子鵑一名雋周蜀鳥也今在處有之陳子聞而賦之曰當仲陽之方茂兮美百草之奮興哀秦隴之多客兮怪雋周之夜鳴動繁情於中歲兮墮纖月於荒城雖開明之克聖兮能無傷乎此聲猨聲猨聲者啼猨聲也陳子聞而賦之曰夜悠永以無際兮扄空山之闃寂揚悲音於林杪兮裂崇岡而四出豈南征之君子兮哀故軀之莫得知變化之非類兮宜安夫運之所值蟬聲一曰蜩螗通謂之蟬陳子聞而賦之曰謝糞壤以沖舉兮登高枝以優游飲清露以自滋兮睨萬物以焉求惡芳聲之莫振兮詎無舌而少休恐字螳螂之奄至兮豈惟限乎春秋蟋蟀聲菴也一名促織陳子聞而賦之曰虛白月於秋除兮避零露干宵徑既升堂以入室兮復同聲而相應此云息而彼興兮寐欲成而還聽歎杼柚之多空兮雖懶婦其何病鴈聲一曰陽鳥陳子聞而賦之曰度秋風於絕塞兮審厥居於彭蠡雲垂垂其天遠兮嘆孤征而莫止既銜蘆以似智兮何不材而取死羨冥冥之高舉兮嗤弋人之慕爾烏聲一曰蜀山鳥陳子聞而賦之曰麗玄形於赤日兮受靈質於瑤星願推愛於君子兮母取訾於一鳴慨雞鶩不可與爭食兮悼危巢之未足以寧懷反哺之大義兮曷勝乎予之私情鴟聲一曰服鳥陳子聞而賦之曰乘陰風以嘯乎幽薄兮度西堂而來此聲擁寒裯而起聽兮驀焉傷夫賈生既同死生於不較兮恐有言之未能知響不為惡聲美兮聊寫賦以與賡
