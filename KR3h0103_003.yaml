body:
  text: 籟紀天籟卷之中野哭野哭者死喪離別激於中而發也陳子聞而賦之曰聲慛慛以激子兮來莫知其誰氏鬱悲音以乍斷兮振餘傷而復起將勾踐之去國兮抑哀薑之過市懷江南以隕涕兮壯包胥於泉裏聞嘆聞嘆者聞人之嗟嘆聲也陳子聞而賦之曰夜蕭寂以澄豫聽兮聆有喟之嘆音知時運之多紛繆兮昧陰陽之有屈伸置彼樞之不可奪兮俟我生之有辰欲尋聲而遠慰兮故再三而莫禁孤嘯嘯吹聲也又蹙口出聲也陳子聞而賦之曰軋喉舌之妙響兮寫清啇於天表闢流雲之既合兮落驚禽於枝杪洵魯女之憂懷兮動傍人之嗟悼將倚柱以循和兮為孰少而孰老市譁市譁者來城郭競市之喧囂也陳子聞而賦之曰喧新豐之雞犬兮呼咸陽之大賈爭魚鹽之湧集兮望繒粟而遙赴朝摩肩以有求兮夕掉臂而不顧恐五尺之見欺兮懼三人之多虎村唱村唱者村落之謳吟里巷之聲調也陳子聞而賦之曰噫頽曜之既匿兮紛下來之牛羊乘籬落之煙火兮出嗚嗚之韻揚歸南山之種豆兮起陌上之採桑痛貞良之摧損兮悲淫佚之抵亡宵舂宵舂者民家夜碓杵臼之聲也陳子聞而賦之曰協動止於大易兮驗凶豐於象垣運長築以宵振兮激飛輪以夜翻搗飢腸以欲絶兮驚饞夢之幻餐懷斗粟之悲歌兮怪亡人之見殘夜織夜織者閨中機杼之聲也陳子聞而賦之曰有空閨之婺婦兮畏秋衾之夜長躍奔梭以吐霧兮轉鳴柚而捲霜聲幽軋以若訴兮見靡他之衷腸謂君子之永逝兮將為誰之衣裳搗衣搗衣者秋深治衣之聲也陳子聞而賦之曰陟涼颷之發發兮秋砧之微微振木葉於將墜兮挾哀音而下飛摧壯遊之行色兮怯關河之舊衣寧溝壑以自處兮無綈袍之故知城柝城柝者邏卒之柝聲也陳子聞而賦之曰崔危堞之拂雲兮戒鳴柝之宵厲引飄風以忽遠兮雜零雨而聚至驅暴客以遐遁兮閔征夫之勞勩宜五丈之莫犯兮何城門之不閉戍鼓戍鼓者郡縣嚴更之鼓聲也陳子聞而賦之曰鼕徐徐其繹奏兮訇沉沉其倦數燈含陰以將滅兮扄千門而萬戶憂方謝而復振兮節嘻吁於將度憐羈魂之未寤兮謂朝陽之禁鼓昏鐘昏鍾者節蚤夜之鍾聲也陳子聞而賦之曰警宵晨之代謝兮宣鳧垂之令音載白月以遙度兮隔層霜而遠聞雖虛受以如響兮非寸之可因謂君子之有思兮如賣降之武臣巷笛巷笛者村巷吹笛聲也陳子聞而賦之曰志噎鬱其無歡兮步躅蹐而登樓聲惋惋其愁豫兮灑芳音而漫流長關山之白髮兮來城闕之素秋臨悲風而悵望兮懷故國以多憂邊笳邊笳者胡人捲蘆葉吹之作聲也陳子聞而賦之曰渺長河之落日兮天沉沉而奏笳摧陰山之白草兮裂黃雲而捲沙泣將軍之降鬼兮興蔡女之咨嗟既大節之莫救兮又奚言之足嘉歸輪歸輪者驅車之聲也陳子聞而賦之曰亘修途以欲暮兮野遼敻其無人翻轔轔以言邁兮奏孤征之兩輪憮勞音之既遠兮望平原之暗塵恐未路之嶮巇兮展沖沖之我心鳴楫鳴楫者操舟之楫聲也陳子聞而賦之曰睇川河以既渺兮蕩鳴楫而何之破秋萍於欲聚兮鼓文浪而回堤笑罔水可行舟兮昧陸海之無涯起風波於四顧兮徒臨流而汝思
